<h2>Users : </h2>
<a routerLink="/adduser" class="nav-item">Add User</a>
<table class="table table-bordered table-striped">
    <thead>
        <tr>
            <th>User Id </th>
            <th>User Name </th>
            <th>Password </th>
            <th>Phone Number </th>
            <th>Email Id </th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
        @for(user of lstUsers; track user.userId; let i = $index){
            <tr>
                <td>{{user.userId}}</td>
                <td>{{user.username}}</td>
                <td>{{user.password}}</td>
                <td>{{user.phoneNo}}</td>
                <td>{{user.emailId}}</td>
                <td>{{user.roleId}}</td>
                <td>
                    <button [routerLink]="['/edituser', user.userId]" class="btn btn-secondary">Edit</button> | <button [routerLink]="['/deleteuser', user.userId]" class="btn btn-danger">Delete</button>
                </td>
            </tr>
        }
    </tbody>
</table>
