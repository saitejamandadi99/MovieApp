<h2>Genre List Api Service </h2>
<div>
    <a routerLink="/addgenresapi" class="nav-item">Add Genre</a>
</div>



<table class="table table-bordered table-stripped">
    <thead>
        <tr>
            <th>Genre Code</th>
            <th>Genre Desc</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        @for(genre of (genres$ | async);track genre.genreId; let i = $index ){
            <tr>
                <td>{{genre.genreCode}}</td>
                <td>{{genre.genreDesc}}</td>
                <td>
                    <button [routerLink]="['/editgenreapi', genre.genreId]" class="btn btn-secondary">Edit</button> | <button [routerLink]="['/deletegenreapi', genre.genreId]" class="btn btn-danger">Delete</button>
                </td>
            </tr>
        }
    </tbody>

    
</table>
