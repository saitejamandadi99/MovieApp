<h2>Add Genre</h2>

<form [formGroup]="genreForm" (ngSubmit)="addGenre()">
    
    <div class="form-group">
        <input hidden name="genreId" formControlName="genreId" id="genreId" class="form-control">
    </div>

    <div class="form-group">
        <label>Genre Code :</label>
        <input name="genreCode"  id="genreCode" formControlName="genreCode" class="form-control">

        <div *ngIf="genreForm.get('genreCode')?.invalid &&    (genreForm.get('genreCode')?.touched || genreForm.get('genreCode')?.dirty)">

            <div *ngIf="genreForm.get('genreCode')?.hasError('required')" class="text-danger">
                Code is required
            </div>

            <div *ngIf="genreForm.get('genreCode')?.hasError('pattern')" class="text-danger">
               code should match the pattern
            </div>
        </div>
    </div>

    <div class="form-group">
        <label>Genre Desc :</label>
        <input name="genreDesc" id="genreDesc" formControlName="genreDesc" class="form-control">
        <div *ngIf="genreForm.get('genreDesc')?.invalid && (genreForm.get('genreDesc')?.touched || genreForm.get('genreDesc')?.dirty)">
            <div *ngIf="genreForm.get('genreDesc')?.hasError('minlength')" class="text-danger">
                Description should be at least 5 characters
            </div>
        </div>
    </div>

    <div class="form-group mt-2">
        <button type="submit" class="btn btn-primary" [disabled]="genreForm.invalid">
            Add Genre
        </button>
    </div>

</form>
